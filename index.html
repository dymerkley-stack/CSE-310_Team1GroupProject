<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wellness RPG Task Board</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wireframe" aria-live="polite">
    <section class="top-section">
      <h1 class="character-name">Wellness Companion</h1>
      <p id="levelText" class="level">Level 1</p>

      <div class="character-box">
        <div id="petAvatar" class="stick-character" role="img" aria-label="Your virtual pet">(o^.^o)</div>
      </div>
      <p id="petMood" class="pet-mood">Your pet is calm and curious.</p>

      <div class="stat-bars">
        <article class="stat-card">
          <div class="stat-label">Physical</div>
          <div class="bar"><div id="physicalBar" class="bar-fill physical"></div></div>
          <div id="physicalValue" class="stat-value">70</div>
        </article>

        <article class="stat-card">
          <div class="stat-label">Mental</div>
          <div class="bar"><div id="mentalBar" class="bar-fill mental"></div></div>
          <div id="mentalValue" class="stat-value">70</div>
        </article>

        <article class="stat-card">
          <div class="stat-label">Social</div>
          <div class="bar"><div id="socialBar" class="bar-fill social"></div></div>
          <div id="socialValue" class="stat-value">70</div>
        </article>

        <article class="stat-card">
          <div class="stat-label">Spiritual</div>
          <div class="bar"><div id="spiritualBar" class="bar-fill spiritual"></div></div>
          <div id="spiritualValue" class="stat-value">70</div>
        </article>
      </div>
    </section>

    <nav class="tabs" aria-label="Wellness categories">
      <button class="tab active" type="button" data-tab="physical" aria-selected="true">Physical</button>
      <button class="tab" type="button" data-tab="mental" aria-selected="false">Mental</button>
      <button class="tab" type="button" data-tab="social" aria-selected="false">Social</button>
      <button class="tab" type="button" data-tab="spiritual" aria-selected="false">Spiritual</button>
    </nav>

    <section class="task-area">
      <div class="section-header">
        <h2 id="taskHeader">Physical Tasks</h2>
      </div>

      <div id="taskList" class="task-list"></div>

      <div class="utility-row">
        <p id="streakText" class="streak">Daily check-ins: 0</p>
        <button id="resetBtn" class="secondary">Reset Pet</button>
      </div>

      <p id="statusText" class="status-text">
        Start by choosing one self-care action you completed today.
      </p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>

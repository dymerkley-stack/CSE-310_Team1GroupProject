<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Map</title>
    <link rel="stylesheet" href="styles.css" />
    <body style="background-image: url('Images/Dawn.webp');"></body>
  </head>
  <body>
    <main class="wireframe" aria-live="polite">
      <section class="mini-games-header world-map-header">
        <a href="battle.html" class="nav-link">&larr; Back to Battle</a>
        <h1>World Map</h1>
        <a href="index.html" class="nav-link">Home &rarr;</a>
      </section>

      <section class="world-map-summary">
        <p id="worldMapSummary">Loading world state...</p>
        <p class="world-map-hint">Tip: Hover over node and shop options for quick hints before choosing.</p>
      </section>

      <section class="world-map-board" aria-label="World map level nodes">
        <div id="worldMapNodes" class="world-map-nodes"></div>
      </section>

      <section class="world-map-node-detail" aria-label="Selected node details">
        <h2 id="worldNodeTitle">Select a node</h2>
        <p id="worldNodeMeta">Choose an unlocked node to prepare your next gauntlet.</p>
        <p id="worldNodeReward">Reward Tier: -</p>
      </section>

      <section class="world-shop" aria-label="Pet coin shop">
        <h2>Traveler Shop</h2>
        <p id="shopBalanceText">Pet Coins: 0</p>
        <div class="world-shop-grid">
          <button id="buyHealPackBtn" type="button" class="secondary" title="Adds stored battle healing for damaged fights.">Heal Pack (12 Coins)</button>
          <button id="buyAttributeTonicBtn" type="button" class="secondary" title="Restores one random pet attribute in your profile.">Attribute Tonic (14 Coins)</button>
          <button id="buyDamageBuffBtn" type="button" class="secondary" title="Adds temporary damage-boost turns for battle.">Battle Damage Buff (10 Coins)</button>
          <button id="buyDefenseBuffBtn" type="button" class="secondary" title="Adds temporary defense turns to reduce incoming damage.">Battle Defense Buff (10 Coins)</button>
          <button id="buyRegenBuffBtn" type="button" class="secondary" title="Adds temporary regeneration turns at battle start.">Battle Regen Buff (10 Coins)</button>
        </div>
        <p id="shopFeedback" class="world-shop-feedback">Shop ready.</p>
      </section>

      <section class="world-map-controls">
        <button id="challengeNodeBtn" type="button" class="primary-btn" disabled>Challenge Selected Node</button>
        <button id="completeNodeDevBtn" type="button" class="secondary">Complete Current Node (Dev)</button>
        <button id="resetWorldMapDevBtn" type="button" class="secondary">Reset World Progress (Dev)</button>
      </section>
    </main>

    <script type="module" src="worldmap.js"></script>
  </body>
</html>

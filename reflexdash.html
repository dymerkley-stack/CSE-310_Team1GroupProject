<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reflex Dash</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="reflexdash.js" defer></script>
    <body style="background-image: url('Images/Dawn.webp');"></body>
  </head>
  <body>
    <main class="wireframe" aria-live="polite">
      <section class="mini-games-header reflex-header">
        <a href="minigames.html" class="nav-link">← Back to Mini Games</a>
        <h1>Reflex Dash</h1>
        <a href="index.html" class="nav-link">Home →</a>
      </section>

      <section class="reflex-intro">
        <p>
          Move between lanes and dodge incoming attacks! 
        </p>
      </section>

      <section class="reflex-hud" aria-label="Game stats">
        <p>Score: <strong id="reflexScore">0</strong></p>
        <p>Best: <strong id="reflexBest">0</strong></p>
        <p>Lives: <strong id="reflexLives">3</strong></p>
        <p>Status: <strong id="reflexStatus">Ready</strong></p>
      </section>

      <section class="reflex-game-area">
        <div id="reflexTrack" class="reflex-track" role="application" aria-label="Reflex Dash game area">

          <div id="reflexPlayer" class="reflex-player" aria-hidden="true">
            <img id="reflexPlayerSprite" class="reflex-player-sprite" alt="" hidden />
          </div>
        </div>
      </section>

      <section class="reflex-controls">
        <button id="moveUpBtn" type="button" class="secondary">Move Up</button>
        <button id="moveDownBtn" type="button" class="secondary">Move Down</button>
        <button id="startReflexBtn" type="button" class="primary-btn">Start Run</button>
        <button id="claimRewardBtn" type="button" class="secondary" disabled>Claim Reward</button>
      </section>

      <section class="reflex-help">
        <p>Keyboard: Use Up/Down arrows or W/S keys to move lanes.</p>
      </section>
    </main>

    
  </body>
</html>
